<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="intel.css">
</head>
<body>

    <div id="login-screen" style="padding: 40px 20px; text-align: center;">
        <h2 style="color: #075E54;">WhatsApp Chat Login</h2>
        <p>Enter your phone number to start chatting</p>
        <input type="text" id="phone-number" placeholder="+2547..." style="width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <div id="recaptcha-container"></div>
        <button id="send-otp-btn" style="background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold;">Send SMS Code</button>
        
        <div id="otp-section" style="display:none; margin-top: 20px;">
            <input type="text" id="otp-code" placeholder="6-digit code" style="width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <button id="verify-otp-btn" style="background: #075E54; color: white; border: none; padding: 10px 20px; border-radius: 5px;">Verify & Start</button>
        </div>
    </div>

    <div id="contact-screen" style="display:none; padding: 20px;">
        <button id="logout-btn" style="float: right; background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px;">Logout</button>
        <h2 style="color: #075E54; text-align: center;">Contacts</h2>
        <div id="contact-buttons" style="margin-top: 20px;">
            <p style="text-align: center; color: gray;">Loading users...</p>
        </div>
    </div>

    <div id="chat-container" style="display:none;">
        <div id="messages" style="height: 400px; overflow-y: scroll; border: 1px solid #ddd; margin-bottom: 10px; padding: 10px;"></div>
        <div id="input-area" style="display: flex;">
            <input type="text" id="user-input" placeholder="Type a message..." style="flex: 1; padding: 10px;">
            <button id="send-btn" style="padding: 10px;">Send</button>
        </div>
        <button onclick="location.reload()" style="margin-top: 10px; width: 100%;">Back to Contacts</button>
    </div>

    <script src="intel.js"></script>
</body>
</html>
