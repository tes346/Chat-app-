<!DOCTYPE html>
<html>
<head>
  <title>Firebase Chat App</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; }
    input, button { padding: 5px; margin: 5px 0; }
    #userList button { margin: 5px 0; display: block; }
    #profileDiv, #usersDiv { margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Firebase Chat App</h2>

  <!-- Authentication -->
  <div id="authDiv">
    <input type="email" id="email" placeholder="Enter email"><br>
    <input type="password" id="password" placeholder="Enter password"><br>
    <label><input type="checkbox" id="rememberMe"> Remember Me</label><br>
    <button onclick="signUp()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <!-- Profile Setup -->
  <div id="profileDiv" style="display:none;">
    <h3>Welcome, <span id="userName"></span></h3>
    <input type="text" id="displayName" placeholder="Set display name"><br>
    <button onclick="setProfile()">Save Profile</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Users List -->
  <div id="usersDiv" style="display:none;">
    <h3>All Users</h3>
    <div id="userList"></div>
  </div>

  <p id="message"></p>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <!-- Your App JS -->
  <script src="intel.js"></script>
</body>
  </html>
