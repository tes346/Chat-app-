<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEwhatsapp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <section id="authScreen" class="screen active">
            <h1>TEwhatsapp</h1>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="password" placeholder="Password">
            </div>
            <div class="btn-row">
                <button onclick="login()">Login</button>
                <button onclick="signUp()">Sign Up</button>
            </div>
            <p id="message"></p>
        </section>

        <section id="profileScreen" class="screen">
            <h1>Setup Profile</h1>
            <input type="text" id="displayName" placeholder="Enter your name">
            <button class="btn-primary" onclick="saveProfile()">Save & Continue</button>
        </section>

        <section id="usersScreen" class="screen">
            <div class="header">
                <h2>Contacts</h2>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
            <div id="userList"></div>
        </section>

        <section id="chatScreen" class="screen">
            <div class="chat-header">
                <button onclick="backToUsers()">←</button>
                <span id="chatWith"></span>
            </div>
            <div id="messages"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button onclick="sendMessage()" class="send-btn">Send</button>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="intel.js"></script>
        </body>
