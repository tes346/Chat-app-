<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #ece5dd; }
        .screen { display: none; padding: 20px; text-align: center; }
        input { width: 80%; padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #25D366; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #chat-box { height: 400px; overflow-y: auto; background: white; padding: 10px; display: flex; flex-direction: column; }
        .sent { align-self: flex-end; background: #dcf8c6; padding: 10px; margin: 5px; border-radius: 10px; }
        .received { align-self: flex-start; background: #ffffff; padding: 10px; margin: 5px; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="login-screen" class="screen" style="display:block;">
        <h2>Login</h2>
        <input type="text" id="phone-number" placeholder="+254...">
        <div id="recaptcha-container"></div>
        <button id="send-otp-btn">Send SMS Code</button>
        <div id="otp-section" style="display:none;">
            <input type="text" id="otp-code" placeholder="6-digit code">
            <button id="verify-otp-btn">Verify</button>
        </div>
    </div>

    <div id="profile-setup" class="screen">
        <h2>Set Username</h2>
        <input type="text" id="display-name" placeholder="Name">
        <button id="save-profile-btn">Save</button>
    </div>

    <div id="contact-screen" class="screen">
        <h3>Contacts</h3>
        <div id="contact-buttons"></div>
    </div>

    <div id="chat-container" class="screen">
        <div id="chat-box"></div>
        <input type="text" id="msg-input" placeholder="Message">
        <button id="send-msg-btn">➤</button>
    </div>

    <script src="intel.js"></script>
</body>
</html>
