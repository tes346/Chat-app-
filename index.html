<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEwhatsapp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <section id="authScreen" class="screen active">
            <h1>TEwhatsapp</h1>
            <div class="auth-box">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <div class="row">
                    <button onclick="login()">Login</button>
                    <button onclick="signUp()">Sign Up</button>
                </div>
            </div>
            <p id="message"></p>
        </section>

        <section id="profileScreen" class="screen">
            <h2>Setup Profile</h2>
            <input type="text" id="displayName" placeholder="Your Name">
            <button onclick="saveProfile()">Save & Continue</button>
        </section>

        <section id="usersScreen" class="screen">
            <div class="header">
                <h3>Contacts</h3>
                <button onclick="logout()" class="small-btn">Logout</button>
            </div>
            <div id="userList"></div>
        </section>

        <section id="chatScreen" class="screen">
            <div class="chat-header">
                <button onclick="backToUsers()">←</button>
                <span id="chatWith"></span>
            </div>
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="intel.js"></script>
</body>
</html>
