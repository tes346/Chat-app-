<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #ece5dd; }
        .screen { display: none; padding: 20px; text-align: center; height: 100vh; box-sizing: border-box; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { width: 95%; padding: 12px; background-color: #25D366; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; background: #e5ddd5; }
        .sent { align-self: flex-end; background: #dcf8c6; padding: 8px 12px; margin: 5px; border-radius: 10px; max-width: 75%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .received { align-self: flex-start; background: white; padding: 8px 12px; margin: 5px; border-radius: 10px; max-width: 75%; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen" style="display: block;">
        <h2 style="color: #075E54; margin-top: 50px;">WhatsApp Chat Login</h2>
        <p>Enter your phone number to start</p>
        <input type="text" id="phone-number" placeholder="+254700000000">
        <div id="recaptcha-container" style="margin: 15px auto;"></div>
        <button id="send-otp-btn">Send SMS Code</button>

        <div id="otp-section" style="display: none; margin-top: 20px;">
            <input type="text" id="otp-code" placeholder="6-digit code">
            <button id="verify-otp-btn">Verify & Login</button>
        </div>
    </div>

    <div id="profile-setup" class="screen">
        <h2 style="color: #075E54;">Complete Your Profile</h2>
        <input type="text" id="display-name" placeholder="Enter Your Name">
        <button id="save-profile-btn">Save & Continue</button>
    </div>

    <div id="contact-screen" class="screen">
        <div style="background: #075E54; color: white; padding: 15px; margin: -20px -20px 20px -20px; display: flex; justify-content: space-between; align-items: center;">
            <span>Contacts</span>
            <button id="logout-btn" style="width: auto; background: none; font-size: 14px;">Logout</button>
        </div>
        <div id="contact-buttons">Loading...</div>
    </div>

    <div id="chat-container" class="screen" style="flex-direction: column; padding: 0;">
        <div style="background: #075E54; color: white; padding: 15px; font-weight: bold; display: flex; align-items: center;">
            <span onclick="location.reload()" style="cursor:pointer; margin-right: 15px; font-size: 20px;">←</span>
            <span id="chat-with-name">Chat</span>
        </div>
        <div id="chat-box"></div>
        <div style="padding: 10px; background: #f0f0f0; display: flex; align-items: center;">
            <input type="text" id="msg-input" placeholder="Type a message..." style="flex: 1; margin: 0; border-radius: 20px;">
            <button id="send-msg-btn" style="width: 50px; height: 50px; border-radius: 50%; margin-left: 10px; display: flex; align-items: center; justify-content: center;">➤</button>
        </div>
    </div>

    <script src="intel.js"></script>
</body>
</html>
