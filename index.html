<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="intel.css">
</head>
<body style="font-family: Arial, sans-serif; background-color: #ece5dd; margin: 0;">

    <div id="login-screen" style="padding: 40px 20px; text-align: center; display: block;">
        <h2 style="color: #075E54;">WhatsApp Chat Login</h2>
        <p>Enter your phone number to start chatting</p>
        <input type="text" id="phone-number" placeholder="+2547..." style="width: 80%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <div id="recaptcha-container"></div>
        <button id="send-otp-btn" style="width: 85%; background: #25D366; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer;">Send SMS Code</button>
        
        <div id="otp-section" style="display:none; margin-top: 20px;">
            <input type="text" id="otp-code" placeholder="6-digit code" style="width: 80%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <button id="verify-otp-btn" style="width: 85%; background: #075E54; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer;">Verify & Start</button>
        </div>
    </div>
 <div id="profile-setup" style="display:none; padding: 40px 20px; text-align: center;">
    <h2 style="color: #075E54;">Complete Your Profile</h2>
    <p>Enter a username so your friends know it's you.</p>
    <input type="text" id="display-name" placeholder="Your Name" style="width: 80%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
    <button id="save-profile-btn" style="width: 85%; background: #25D366; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer;">Save & Continue</button>
 </div>
    
    <div id="contact-screen" style="display:none; padding: 20px;">
        <button id="logout-btn" style="float: right; background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Logout</button>
        <h2 style="color: #075E54; text-align: center;">Contacts</h2>
        <hr>
        <div id="contact-buttons" style="margin-top: 20px;">
            <p style="text-align: center; color: gray;">Searching for friends...</p>
        </div>
    </div>

    <div id="chat-container" style="display:none; flex-direction: column; height: 100vh;">
        <div style="background: #075E54; color: white; padding: 15px; display: flex; align-items: center;">
            <button onclick="location.reload()" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 10px;">←</button>
            <span id="chatting-with-name">Chat</span>
        </div>
        
        <div id="messages" style="flex: 1; overflow-y: auto; padding: 15px; background: #e5ddd5;">
            </div>

        <div id="input-area" style="padding: 10px; background: #f0f0f0; display: flex;">
            <input type="text" id="user-input" placeholder="Type a message..." style="flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none;">
            <button id="send-btn" style="margin-left: 10px; background: #075E54; color: white; border: none; padding: 10px 20px; border-radius: 50%; cursor: pointer;">➤</button>
        </div>
    </div>

    <script src="intel.js"></script>

</body>
</html>
