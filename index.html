<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEwhatsapp App</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div id="app-container">
        <h2 class="app-title">TEwhatsapp</h2>
        <p id="message"></p>

        <div id="authScreen" class="screen active">
            <div class="card">
                <h3>Welcome</h3>
                <input type="email" id="email" placeholder="Enter email">
                <input type="password" id="password" placeholder="Enter password">
                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe"> 
                    <label for="rememberMe">Remember Me</label>
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="login()">Login</button>
                    <button class="btn-secondary" onclick="signUp()">Sign Up</button>
                </div>
            </div>
        </div>

        <div id="profileScreen" class="screen">
            <div class="card">
                <h3>Setup Profile</h3>
                <input type="text" id="displayName" placeholder="Enter your name">
                <button class="btn-primary" onclick="saveProfile()">Save & Continue</button>
            </div>
        </div>

        <div id="usersScreen" class="screen">
            <div class="card">
                <div class="header-flex">
                    <h3>Contacts</h3>
                    <button class="btn-small" onclick="logout()">Logout</button>
                </div>
                <div id="userList"></div>
            </div>
        </div>

        <div id="chatScreen" class="screen">
            <div class="chat-card">
                <div class="chat-header">
                    <button onclick="backToUsers()">←</button>
                    <span id="chatWith"></span>
                </div>
                <div id="messages"></div>
                <div id="input-area">
                    <input type="text" id="messageInput" placeholder="Type a message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="intel.js"></script>
</body>
</html>
