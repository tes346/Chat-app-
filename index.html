<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEwhatsapp App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <div id="authScreen" class="screen active">
            <h2>TEwhatsapp</h2>
            <div class="auth-box">
                <input type="email" id="email" placeholder="Enter email">
                <input type="password" id="password" placeholder="Enter password">
                <label><input type="checkbox" id="rememberMe"> Remember Me</label>
                <div class="btn-row">
                    <button onclick="login()">Login</button>
                    <button onclick="signUp()">Sign Up</button>
                </div>
            </div>
            <p id="message"></p>
        </div>

        <div id="profileScreen" class="screen">
            <h2>Setup Profile</h2>
            <input type="text" id="displayName" placeholder="Enter your name">
            <button class="btn-primary" onclick="saveProfile()">Save & Continue</button>
        </div>

        <div id="usersScreen" class="screen">
            <div class="header-bar">
                <h3>Contacts</h3>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <div id="userList"></div>
        </div>

        <div id="chatScreen" class="screen">
            <div class="chat-header">
                <button onclick="backToUsers()">← Back</button>
                <span id="chatWith"></span>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="intel.js"></script>
</body>
</html>
