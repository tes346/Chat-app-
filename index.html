<!DOCTYPE html>
<html>
<head>
  <title>Firebase Chat App</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial; }
    input, button { padding: 5px; margin: 5px 0; }
    #userList button { margin: 5px 0; display: block; width: 200px; text-align: left; }
    #profileDiv, #usersDiv, #chatDiv { margin-top: 20px; }
    #messages { border:1px solid #ccc; height:200px; overflow-y:scroll; padding:5px; }
  </style>
</head>
<body>
  <h2>Firebase Chat App</h2>

  <!-- Authentication -->
  <div id="authDiv">
    <input type="email" id="email" placeholder="Enter email"><br>
    <input type="password" id="password" placeholder="Enter password"><br>
    <label><input type="checkbox" id="rememberMe"> Remember Me</label><br>
    <button onclick="signUp()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <!-- Profile Setup -->
  <div id="profileDiv" style="display:none;">
    <h3>Welcome, <span id="userName"></span></h3>
    <input type="text" id="displayName" placeholder="Set display name"><br>
    <button onclick="setProfile()">Save Profile</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Users List -->
  <div id="usersDiv" style="display:none;">
    <h3>All Users</h3>
    <div id="userList"></div>
  </div>

  <!-- Chat Area -->
  <div id="chatDiv" style="display:none; margin-top:20px;">
    <h3>Chat with <span id="chatWith"></span></h3>
    <div id="messages"></div>
    <input type="text" id="messageInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
    <button onclick="closeChat()">Close Chat</button>
  </div>

  <p id="message"></p>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <!-- App JS -->
  <script src="intel.js"></script>
</body>
  </html>
